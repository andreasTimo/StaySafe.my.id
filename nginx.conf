server {
    listen 8080;
    server_name localhost;

    # Disable cache for HTML entry point to ensure instant updates on redeploy
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite-hashed static assets aggressively (1 year)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache standard static files (images, fonts, icons) at root
    location ~* \.(?:ico|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|webp|map)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
